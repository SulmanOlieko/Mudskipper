services:
  nginx:
    image: nginx:alpine
    container_name: mudskipper_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:alpine
    container_name: mudskipper_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-mud_user}
      POSTGRES_PASSWORD: ${DB_PASS:-mud_pass}
      POSTGRES_DB: ${DB_NAME:-mudskipper}
    # Keep ports here so the Shiny app on your host machine can connect
    ports:
      - "5432:5432"
    volumes:
      # Updated mount point to /var/lib/postgresql as recommended by the Postgres 18+ image
      - ./postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mud_user}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:alpine
    container_name: mudskipper_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
