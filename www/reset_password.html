<script>
  document.addEventListener("DOMContentLoaded", function () {
    
    // --- 1. CONFIGURATION ---
    const MIN_PASSWORD_LENGTH = 8;
    const EMAIL_REGEX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    // --- 2. HELPER FUNCTIONS ---

    function setupPasswordToggle(inputId) {
      const passwordInput = document.getElementById(inputId);
      if (!passwordInput) return;
      const toggleBtn = passwordInput.closest('.input-group').querySelector('a');
      
      toggleBtn.addEventListener("click", function (e) {
        e.preventDefault();
        const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
        passwordInput.setAttribute("type", type);
        
        // Visual opacity change
        toggleBtn.style.opacity = type === "text" ? "1" : "0.5";
        
        // Icon change
        const svg = toggleBtn.querySelector('svg');
        if (type === "text") {
           // Eye Off Icon
           svg.innerHTML = '<path d="M10 12a2 2 0 1 0 4 0a2 2 0 0 0 -4 0" /><path d="M21 12c-2.4 4 -5.4 6 -9 6c-3.6 0 -6.6 -2 -9 -6c2.4 -4 5.4 -6 9 -6c3.6 0 6.6 2 9 6" /><path d="M3 3l18 18" />';
        } else {
           // Eye On Icon
           svg.innerHTML = '<path d="M10 12a2 2 0 1 0 4 0a2 2 0 0 0 -4 0" /><path d="M21 12c-2.4 4 -5.4 6 -9 6c-3.6 0 -6.6 -2 -9 -6c2.4 -4 5.4 -6 9 -6c3.6 0 6.6 2 9 6" />';
        }
      });
    }

    function showError(input, message) {
      input.classList.add('is-invalid');
      let feedback = input.parentElement.querySelector('.invalid-feedback');
      if (!feedback) {
        feedback = document.createElement('div');
        feedback.className = 'invalid-feedback';
        input.parentElement.appendChild(feedback);
      }
      feedback.textContent = message;
    }

    function clearError(input) {
      input.classList.remove('is-invalid');
    }

    // --- 3. VALIDATION LOGIC ---

    // A. RESET PASSWORD VALIDATION (NEW)
    function validateReset(e) {
      e.preventDefault(); // Stop page reload
      
      const pwd = document.getElementById('reset_password');
      const confirm = document.getElementById('reset_password_confirm');
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');

      clearError(pwd);
      clearError(confirm);
      
      let isValid = true;

      // Validate Password Strength
      if (!pwd.value) {
        showError(pwd, "Password is required");
        isValid = false;
      } else if (pwd.value.length < MIN_PASSWORD_LENGTH) {
        showError(pwd, `Password must be at least ${MIN_PASSWORD_LENGTH} characters`);
        isValid = false;
      }

      // Validate Match
      if (pwd.value !== confirm.value) {
        showError(confirm, "Passwords do not match");
        isValid = false;
      }
      
      // Validate Token existence
      if (!token) {
         alert("Error: Invalid link. Reset token is missing.");
         isValid = false;
      }

      if (isValid) {
        // disable button to prevent double clicks
        const btn = document.getElementById('submit_reset');
        btn.disabled = true;
        btn.innerHTML = 'Updating...';

        // CRITICAL: Send data back to Shiny via URL Redirect
        // This reloads the MAIN app with the new password and token in the URL
        const targetUrl = window.location.origin + window.location.pathname.replace("reset_password.html", "") + 
                          "?action=password_update_submit" + 
                          "&token=" + encodeURIComponent(token) + 
                          "&password=" + encodeURIComponent(pwd.value);
        
        window.location.href = targetUrl;
      }
    }

    // --- 4. INITIALIZATION ---

    // Setup Toggles (Now including the reset fields!)
    setupPasswordToggle("password"); 
    setupPasswordToggle("signup_password"); 
    setupPasswordToggle("reset_password");          // Added
    setupPasswordToggle("reset_password_confirm");  // Added

    // Attach Listeners
    const loginBtn = document.getElementById('submit_login');
    if (loginBtn) loginBtn.addEventListener('click', validateLogin); // Assumes validateLogin exists elsewhere or is not needed here

    const signupBtn = document.getElementById('submit_signup');
    if (signupBtn) signupBtn.addEventListener('click', validateSignup); // Assumes validateSignup exists elsewhere

    const resetBtn = document.getElementById('submit_reset');
    if (resetBtn) resetBtn.addEventListener('click', validateReset);  // Added
  });
</script>
