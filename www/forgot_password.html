<style>

  height: 100% !important;
  width: 100% !important;
  overflow: hidden !important;
  margin: 0 !important;
  padding: 0 !important;

<body style="overflow: hidden !important;">
  
    <!-- BEGIN GLOBAL THEME SCRIPT -->
    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/js/tabler.min.js"></script>
     <!-- END GLOBAL THEME SCRIPT -->
     
<div class="page page-center">
      <div class="container container-tight py-4">
        <div class="text-center mb-4">
          <!-- BEGIN NAVBAR LOGO -->
            <a href="javascript:void(0);" aria-label="Mudskipper" class="navbar-brand navbar-brand-autodark">
              <img
                src="mudskipper_logo.svg"
                alt="Mudskipper Logo"
                width="40" height="40"
                decoding="async"
                fetchpriority="high" />
                Mudskipper
              </a>
              <!-- END NAVBAR LOGO -->
        </div>
        <form class="card card-md" action="./" method="get" autocomplete="off" novalidate>
          <div class="card-body">
            <h2 class="card-title text-center mb-4">Forgot password</h2>
            <p class="text-secondary mb-4">Enter your email address and your password will be reset and emailed to you.</p>
            <div class="mb-3">
              <label class="form-label">Email address</label>
              <input id="forgot_email" type="email" class="form-control" placeholder="your@email.com" autocomplete="off"/>
            </div>
            <div class="form-footer">
              <button id="submit_forgot" type="submit" class="btn btn-primary btn-4 w-100">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="icon icon-2">
                  <path d="M3 7a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v10a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-10z" />
                  <path d="M3 7l9 6l9 -6" />
                </svg>
                Send me new password
              </button>
            </div>
          </div>
        </form>
        <div class="text-center text-secondary mt-3">Forget it, <a href="./sign_in.html">send me back</a> to the sign in page.</div>
      </div>
    </div>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    
    // --- 1. CONFIGURATION ---
    const MIN_PASSWORD_LENGTH = 8;
    const EMAIL_REGEX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    // --- 2. HELPER FUNCTIONS ---

    function setupPasswordToggle(inputId) {
      const passwordInput = document.getElementById(inputId);
      if (!passwordInput) return;
      const toggleBtn = passwordInput.closest('.input-group').querySelector('a');
      
      toggleBtn.addEventListener("click", function (e) {
        e.preventDefault();
        const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
        passwordInput.setAttribute("type", type);
        toggleBtn.style.opacity = type === "text" ? "1" : "0.5";
        
        const svg = toggleBtn.querySelector('svg');
        if (type === "text") {
           svg.innerHTML = '<path d="M10 12a2 2 0 1 0 4 0a2 2 0 0 0 -4 0" /><path d="M21 12c-2.4 4 -5.4 6 -9 6c-3.6 0 -6.6 -2 -9 -6c2.4 -4 5.4 -6 9 -6c3.6 0 6.6 2 9 6" /><path d="M3 3l18 18" />';
        } else {
           svg.innerHTML = '<path d="M10 12a2 2 0 1 0 4 0a2 2 0 0 0 -4 0" /><path d="M21 12c-2.4 4 -5.4 6 -9 6c-3.6 0 -6.6 -2 -9 -6c2.4 -4 5.4 -6 9 -6c3.6 0 6.6 2 9 6" />';
        }
      });
    }

    function showError(input, message) {
      input.classList.add('is-invalid');
      let feedback = input.parentElement.querySelector('.invalid-feedback');
      if (!feedback) {
        feedback = document.createElement('div');
        feedback.className = 'invalid-feedback';
        input.parentElement.appendChild(feedback);
      }
      feedback.textContent = message;
    }

    function clearError(input) {
      input.classList.remove('is-invalid');
    }

    // --- 3. VALIDATION LOGIC ---

    // A. LOGIN VALIDATION
    function validateLogin(e) {
      let isValid = true;
      const email = document.getElementById('email');
      const password = document.getElementById('password');

      clearError(email);
      clearError(password);

      if (!email.value.trim()) {
        showError(email, "Email is required");
        isValid = false;
      } else if (!EMAIL_REGEX.test(email.value.trim())) {
        showError(email, "Please enter a valid email address");
        isValid = false;
      }

      if (!password.value) {
        showError(password, "Password is required");
        isValid = false;
      }

      if (!isValid) e.preventDefault();
    }

    // B. SIGNUP VALIDATION
    function validateSignup(e) {
      let isValid = true;
      const email = document.getElementById('signup_email');
      const password = document.getElementById('signup_password');

      clearError(email);
      clearError(password);

      if (!email.value.trim()) {
        showError(email, "Email is required");
        isValid = false;
      } else if (!EMAIL_REGEX.test(email.value.trim())) {
        showError(email, "Please enter a valid email address");
        isValid = false;
      }

      if (!password.value) {
        showError(password, "Password is required");
        isValid = false;
      } else if (password.value.length < MIN_PASSWORD_LENGTH) {
        showError(password, `Password must be at least ${MIN_PASSWORD_LENGTH} characters`);
        isValid = false;
      }

      if (!isValid) e.preventDefault();
    }

    // C. FORGOT PASSWORD VALIDATION
    function validateForgot(e) {
      let isValid = true;
      const email = document.getElementById('forgot_email');

      clearError(email);

      if (!email.value.trim()) {
        showError(email, "Email is required");
        isValid = false;
      } else if (!EMAIL_REGEX.test(email.value.trim())) {
        showError(email, "Please enter a valid email address");
        isValid = false;
      }

      if (!isValid) e.preventDefault();
    }

    // --- 4. INITIALIZATION ---

    // Setup Toggles (Safe to call even if element missing)
    setupPasswordToggle("password");
    setupPasswordToggle("signup_password");

    // Attach Listeners (Only if elements exist)
    const loginBtn = document.getElementById('submit_login');
    if (loginBtn) loginBtn.addEventListener('click', validateLogin);

    const signupBtn = document.getElementById('submit_signup');
    if (signupBtn) signupBtn.addEventListener('click', validateSignup);
    
    const forgotBtn = document.getElementById('submit_forgot');
    if (forgotBtn) forgotBtn.addEventListener('click', validateForgot);
  });
</script>
